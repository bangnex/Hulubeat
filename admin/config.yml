backend:
  name: git-gateway
  branch: main
media_folder: assets/uploads
public_folder: /assets/uploads
collections:
    - name: beats
    label: Beats
    folder: _beats
    create: true
    slug: '{{slug}}'
    fields:
            - {label: Title, name: title, widget: string}
            - {label: Audio, name: audio, widget: file}
            - {label: Body, name: body, widget: markdown}
